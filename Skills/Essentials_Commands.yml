  - sudoskill{s=[
    - aura{duration=99999999;i=20;auraname=godmode;cancelondeath=false;cancelonquit=false;
      components=[
        - onDamaged{cancelevent=true}
        ]} @self 
    ]} @playerbyname{name=<skill.var.player|<caster.name>>;targetself=true;targetcreative=true}
