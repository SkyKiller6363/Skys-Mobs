  - message{m=<#54fc54>God Mode <#54fcfc>Enabled} @playerbyname{name=<skill.var.player|<caster.name>>;targetself=true;targetcreative=true}

godremove:
  Command:
    Id: ungod
    Aliases:
    - remgod
    - removegod
    Completions:
      player:
      - players
  Conditions:
  - haspermission{p=skycommands.godmode}
  Skills:
  - removeaura{aura=godmode} @playerbyname{name=<skill.var.player|<caster.name>>;targetself=true;targetcreative=true}
  - message{m=<#54fc54>God Mode <#fa2222>Disabled</#fa2222> for <#54fcfc><skill.var.player|<caster.name>>} @self ?!stringequals{val1=<skill.var.player>;val2=UNDEFINED}
