#/god [player] [on|off] - Makes the player immune to all damage
god:
  Command:
    Id: god
    Aliases: 
    - godmode
    - togglegod
    Completions:
      player:
        - players
      onoroff:
        - Enabled
        - Disabled
  Conditions:
  - haspermission{p=skycommands.godmode} true "<#d45353>You do not have permission to execute that command"
  - stringequals{val1=<skill.var.player>;val2=UNDEFINED} orElseCast godplayer
  - hasaura{aura=godmode} castInstead godremove
  Skills:
  - aura{duration=99999999;i=20;auraname=godmode;cancelondeath=false;cancelonquit=false;
    components=[
      - onDamaged{cancelevent=true}
      ]} @self 
  - message{m=<#df1ab4>God Mode <#3bfa22>Enabled} @self

godremove:
  Command:
    Id: ungod
    Aliases:
    - remgod
    - removegod
  Conditions:
  - haspermission{p=skycommands.godmode}
  Skills:
  - removeaura{aura=godmode} @self
  - message{m=<#df1ab4>God Mode <#fa2222>Disabled} @self

godplayer:
  Conditions:
  - haspermission{p=skycommands.godmodeother} true "<#d45353>You do not have permission to execute that command"
  Skills:
  - skill{s=godplayer2} @playerbyname{name=<skill.var.player>;targetself=true}

godplayer2:
  Conditions:
  - stringequals{val1=Disabled;val2=<skill.var.onoroff>} castInstead godplayerremove
  - stringequals{val1=Enabled;val2=<skill.var.onoroff>}
  # TargetConditions:
  # - hasaura{aura=godmode} castInstead godplayerremove
  Skills:
  - sudoskill{s=[
    - aura{duration=99999999;i=20;auraname=godmode;cancelondeath=false;cancelonquit=false;
      components=[
        - onDamaged{cancelevent=true}
        ]} @self 
    ]} @playerbyname{name=<skill.var.player>;targetself=true}
  - message{m=<#df1ab4>God Mode <#3bfa22>Enabled</#3bfa22> for <#3bfa22><skill.var.player>} @self
  - message{m=<#df1ab4>God Mode <#3bfa22>Enabled} @playerbyname{name=<skill.var.player>;targetself=true}

godplayerremove:
  # Conditions:
  # - stringequals{val1=Disabled;val2=<skill.var.onoroff>}
  Skills:
  - removeaura{aura=godmode} @playerbyname{name=<skill.var.player>;targetself=true}
  - message{m=<#df1ab4>God Mode <#fa2222>Disabled</#fa2222> for <#3bfa22><skill.var.player>} @self
  - message{m=<#df1ab4>God Mode <#fa2222>Disabled} @playerbyname{name=<skill.var.player>;targetself=true}

