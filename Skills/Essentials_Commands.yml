#- - - - - Start home - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - 
# /sethome - set's 1 personal home for the caster
# /home - goes home to the 1 personal home

homeset:
  Command:
    Id: homeset
    Aliases:
      - ssethome
      - sethome
      - shomeset
    Completions:
      homename: #in the future I can maybe do <caster.var.homelist> and be a list of homes
        - <name>
  Conditions:
  - haspermission{p=skycommands.homeset} orElseCast skypermissiondenied
  Skills:
  - vskill{s=[ - setvariablelocation{var=caster.home_<skill.var.homename|home>;val=@selflocation{blockcentered=true};save=true} ]} @self
  - setvar{var=caster.homeset;val=<skill.var.homename|home>;save=true;type=SET} @self ?!varisset{var=caster.homeset}
  - addvar{var=caster.homeset;val=<skill.var.homename|home>} @self ?varisset{var=caster.homeset}

  - message{m=creating home <skill.var.homename|home>} @self

home:
  Command:
    Id: home
    Aliases:
      - shome
    Completions:
      homename:
        - <name>
  Conditions:
  - haspermission{p=skycommands.home} orElseCast skypermissiondenied
  - stringequals{val1=<caster.var.homeset.contains{with=<skill.var.homename|home>}>;val2=true}
  Skills:
  - vskill{s=[ - teleport{pp=false;py=false} @variableLocation{var=caster.home_<skill.var.homename|home>} ]} @self
  - message{m=teleporting to <skill.var.homename|home>} @self
  - delay 4
  - ender @selflocation
  - sound{s=entity.player.teleport} @self


homelist:
  Command:
    Id: homelist
    Aliases:
    - listhome
    - shomelist
    - slisthome
  Conditions:
  - haspermission{p=skycommands.homelist} orElseCast skypermissiondenied
  Skills:
  - message{m=<caster.var.homeset>} @self 

homeremove:
  Command:
    Id: homeremove
    Aliases:
    - remhome
    - sremovehome
    - sremhome
    - removehome
    - shomeremove
    Completions:
      homename:
        - <name>
  Conditions:
  - haspermission{p=skycommands.homeremove}
  Skills:
  - vskill{s=[ - unsetvar{var=caster.home_<skill.var.homename|home>} ]} @self
  - subtractvariable{var=caster.homeset;val=<skill.var.homename|home>} @self

  - message{m=<skill.var.homename|home> home removed} @self



