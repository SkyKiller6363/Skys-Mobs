vanish: #doesn't work for some reason. hide aura being weird. 
  Command:
    Id: vanish
    Completions:
      onoroff:
      - on
      - off
      player:
      - players
  Conditions:
  - haspermission{p=skycommands.vanish} orElseCast skypermissiondenied 
  - stringequals{val1=<skill.var.player>;val2=UNDEFINED} orElseCast vanishother
  - hasaura{aura=#hiding} castinstead vanishremove
  Skills:
  - skill{s=vanish2} @server
vanish2:
  TargetConditions:
  - haspermission{p=skycommands.vanish} false
  Skills:
  - hide{duration=99999999;i=20;cancelondeath=false;cancelonquit=false;bartimer=true}
  - message{m=<#54fc54>Vanish Enabled} @self
  - message{m=<gold><caster.name> has left the server} @server{targetself=true}

vanishremove:
  Skills:
  - showentity @server
  - auraremove{name=vanishcommand} @self
  - message{m=<#54fc54>Vanish Disabled} @self
  - message{m=<gold><caster.name> has joined the server} @server{targetself=true}

vanishother:
  Conditions:
  - haspermission{p=skycommands.vanishother} orElseCast skypermissiondenied
  Skills:
  - skill{s=vanishother2} @playerByName{name=<skill.var.player}
vanishother2:
  Targetconditions:
  - hasaura{aura=#hiding} castinstead vanishotherremove
  Skills:
  - sudoskill{s=[
    - hide{duration=99999999;i=20;cancelondeath=false;cancelonquit=false} @self 
    ]} @playerbyname{name=<skill.var.player>}
  - message{m=<#54fc54>Vanish Enabled for <#2a7c3c><skill.var.player>} @self
  - message{m=<#54fc54>Vanish Enabled} @playerbyname{name=<skill.var.player>;targetself=true}
  - message{m=<gold><skill.var.player> has left the server} @server{targetself=true}

vanishotherremove:
  Skills:
  - sudo{skill=[ showentity @server ]} @playerbyname{name=<skill.var.player>;targetself=true}
  - removeaura{aura=vanishcommand} @playerbyname{name=<skill.var.player>;targetself=true}
  - message{m=<#54fc54>Vanish Disabled} @self
  - message{m=<gold><caster.name> has joined the server} @server{targetself=true}

