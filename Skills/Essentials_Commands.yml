#/god [player] [on|off] - Makes the player immune to all damage

god:
  Command:
    Id: god
    Aliases: 
    - godmode
    - togglegod
    - sgod
    - sgodmode
    - stogglegod
    Completions:
      player:
      - players
      onoroff:
      - Enable
      - Disable
  Conditions:
  - haspermission{p=skycommands.godmode} orElseCast skypermissiondenied
  Skills:
  - skill{s=god2} @playerbyname{name=<skill.var.player|<caster.name>>;targetself=true;targetcreative=true}

god2:
  Conditions:
  - (stringequals{val1=<skill.var.player>;val2=UNDEFINED} true || haspermission{p=skycommands.godmodeother} ) orElseCast skypermissiondenied
  - stringequals{val1=Disable;val2=<skill.var.onoroff>} castInstead godremove
  TargetConditions:
  - hasaura{aura=godmode} castInstead godremove
