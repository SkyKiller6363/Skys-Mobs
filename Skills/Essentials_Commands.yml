#- - - - - Start Burn - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - 
#/burn <player> <seconds> 
#Sets a player on fire
burn:
  Command:
    Id: burn
    Aliases: 
    - ignite
    - sburn
    - signite
    Completions:
      player:
      - players
      duration:
      - seconds
  Conditions:
  - haspermission{p=skycommands.burn} orElseCast skypermissiondenied
  Skills:
  - skill{s=burn2} @playerbyname{name=<skill.var.player{default=<caster.name>}>;targetself=true;targetcreative=true}
burn2:
  Skills:
  - ignite{duration=20*<skill.var.duration{default=5}>} @playerbyname{name=<skill.var.player{default=<caster.name>}>;targetself=true;targetcreative=true}
  - message{m="<#54fc54>You will <#f53900>Burn</#f53900> for <#2a7c3c><skill.var.duration{default=5}></#2a7c3c> seconds."} @playerbyname{name=<skill.var.player{default=<caster.name>}>;targetself=true;targetcreative=true} ?!stringequals{val1=UNDEFINED;val2=<skill.var.player>}
  
  - message{m="<#54fc54>Igniting <#2a7c3c><skill.var.player></#2a7c3c> for <#2a7c3c><skill.var.duration{default=5}></#2a7c3c> seconds."} @self ?!stringequals{val1=UNDEFINED;val2=<skill.var.player>}
  - message{m="<#54fc54>You will <#f53900>Burn</#f53900> for <#2a7c3c><skill.var.duration{default=5}></#2a7c3c> seconds."} @self ?stringequals{val1=UNDEFINED;val2=<skill.var.player>}

#- - - - - End Burn - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - 


#- - - - - Start Depth - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - 
# /depth 
# States current depth, relative to sea level
depth:
  Command:
    Id: depth
    Aliases:
    - sdepth
  Conditions:
  # - haspermission{p=skycommands.depth} orElseCast skypermissiondenied
  Skills:
  - setvar{var=abovesea;val="<caster.l.y>-63"} @self
  - setvar{var=belowsea;val="63-<caster.l.y>"} @self
  - setvar{var=currentlevel;val=<caster.l.y>} @self

  - message{m="<&nl><#54fc54>Above Sea Level by<white><&co> <#2a7c3c><skill.var.abovesea> <&nl><#54fc54>Current Y Level<white><&co> <#2a7c3c><skill.var.currentlevel>"} @self ?comparevalue{val1=<caster.l.y>;val2=63;type=INTEGER;operator=>} 
  - message{m="<&nl><#54fc54>Below Sea Level by<white><&co> <#2a7c3c><skill.var.belowsea> <&nl><#54fc54>Current Y Level<white><&co> <#2a7c3c><skill.var.currentlevel>"} @self ?comparevalue{val1=<caster.l.y>;val2=63;type=INTEGER;operator=<} 
  - message{m="<#54fc54>You are at Sea Level!"} @self ?comparevalue{val1=<caster.l.y>;val2=63;type=INTEGER;operator===} 

#- - - - - End Depth - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - 


