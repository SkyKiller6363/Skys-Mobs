#all of this is still very much so experimental. I'm mostly just learning how the command system works within mythic and how best to build everything. 

#Fly Command
playerfly: #Main Fly Command
  Command:
    Id: fly
    Completions:
      player:
      - players
  Conditions:
  - haspermission{p=skycommands.fly} true "<#d45353>You do not have permission to execute that command" #permissiondenied
  - stringequals{val1=<skill.var.player>;val2=UNDEFINED} orElseCast playerflyother
  - hasaura{aura=flycommand} castinstead playerfly-remove
  Skills:
 # Give Fly to Self
  - aura{duration=99999999;i=20;auraname=flycommand;cancelondeath=false;cancelonquit=false;
    components=[
      - fly
      ]} @self 
  - message{m=<#df1ab4>Fly Enabled} @self

playerfly-remove: # Remove Fly from Self
  Skills:
  - removeaura{aura=flycommand} @self 
  - message{m=<#df1ab4>Fly Disabled} @self

playerflyother: # Give Fly to Other Player
  Conditions:
  - haspermission{p=skycommands.flyother} true "<#d45353>You do not have permission to execute that command"
  Skills:
  - skill{s=playerflyother2} @playerbyname{name=<skill.var.player>;targetself=true}
playerflyother2:
  TargetConditions:
  - hasaura{aura=flycommand} castinstead playerflyother-remove
  Skills:
  - sudoskill{s=[
    - aura{duration=99999999;i=20;auraname=flycommand;cancelondeath=false;cancelonquit=false;
      components=[
        - fly
        ]} @self 
    ]} @playerbyname{name=<skill.var.player>;targetself=true}
  - message{m=<#df1ab4>Fly Enabled for <#3bfa22><skill.var.player>} @self
  - message{m=<#df1ab4>Fly Enabled} @playerbyname{name=<skill.var.player>;targetself=true}

playerflyother-remove:
  Skills:
  - removeaura{aura=flycommand} @playerbyname{name=<skill.var.player>;targetself=true}
  - message{m=<#df1ab4>Fly Disabled for <#3bfa22><skill.var.player>} @self
  - message{m=<#df1ab4>Fly Disabled} @playerbyname{name=<skill.var.player>;targetself=true}



