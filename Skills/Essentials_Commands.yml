#/list - Lists all the players online

#/more -  fills the itemstack in the hand to max
more:
  Command:
    Id: more
  Conditions:
  - haspermission{p=skycommands.more} true "<#d45353>You do not have permission to execute that command"
  Skills:
  - setvar{var=skill.moreitem;val=<target.item.itemstack.HAND>;type=ITEM} @self
  - setvar{var=skill.moreitem;val=<skill.var.moreitem.withAmount.64>;type=ITEM} @self
  # - consumehelditem{a=64} @self
  - equip{i=itemvariable{variable=skill.moreitem} HAND} @self
  - message{m="<sprite:"minecraft:items":item/<skill.var.moreitem.type>><#3bfa22><skill.var.moreitem.type.toString.lowercase.capitalize.replace{from="_";to=" "}> <#df1ab4>stack updated to <#3bfa22>64"} @self

