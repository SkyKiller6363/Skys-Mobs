#- - - - - Start Speed - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - 
#/speed [WALK|FLY] <speed> [player]

setspeed:
  Command:
    Id: speed
    Aliases: 
    - setspeed
    - flyspeed
    - walkspeed
    Completions:
      walkorfly:
      - walk
      - fly
      speed:
      - 2
      - 5
      - 10
      player:
      - players
  Conditions:
  - haspermission{p=skycommands.setspeed} orElseCast skypermissiondenied
  - stringequals{val1=<skill.var.walkorfly>;val2=UNDEFINED} false
  - stringequals{val1=<skill.var.speed>;val2=UNDEFINED} false
  - stringequals{val1=<skill.var.player>;val2=UNDEFINED} orElseCast setspeedother
  Skills:
  - vskill{skill=[ - setspeed{type=<skill.var.walkorfly>;amount=<skill.var.speed>} @self ]}
  - message{m="<#54fc54><skill.var.walkorfly.capitalize> speed set to <#2a7c3c><skill.var.speed>"} @self
setspeedother:
  Conditions:
  - haspermission{p=skycommands.setspeedother} orElseCast skypermissiondenied
  Skills:
  - vskill{skill=[ - setspeed{type=<skill.var.walkorfly>;amount=<skill.var.speed>} @playerbyname{name=<skill.var.player>;targetself=true} ]}
  - message{m="<#54fc54><skill.var.walkorfly.capitalize> speed set to <#2a7c3c><skill.var.speed></#2a7c3c> for <#2a7c3c><skill.var.player>"} @self
  - message{m="<#54fc54><skill.var.walkorfly.capitalize> speed set to <#2a7c3c><skill.var.speed>"} @playerbyname{name=<skill.var.player>;targetself=true}

