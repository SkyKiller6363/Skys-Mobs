#- - - - - Start Spawn - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - 
#/spawn - takes you to worldspawn
#/setspawn - sets a new worldspawn to your current coordinates

spawn:
  Command:
    Id: spawn
    Aliases:
    - sspawn
  Conditions:
  - haspermission{p=skycommands.spawn} orElseCast skypermissiondenied
  Skills:
  - teleport{pp=false;py=false} @varlocation{var=world.spawnlocation}
  - delay 2
  - ender @selflocation
  - sound{s=entity.player.teleport} @self

setspawn:
  Command:
    Id: setspawn
    Aliases:
    - ssetspawn
  Conditions:
  - haspermission{p=skycommands.setspawn} orElseCast skypermissiondenied
  Skills:
  - setVariableLocation{var=world.spawnlocation;val=@selflocation{blockcentered=true};save=true} @self

  # - command{cmd="minecraft:setworldspawn <caster.l.x{round=0}> <caster.l.y{round=0}> <caster.l.z{round=0}> <caster.l.pitch{round=0}> <caster.l.yaw{round=0}>";asop=true;ascaster=true} @self

  - message{m=<u><#54fcfc><caster.l.w></u> <#54fc54>spawn set to X<&co> <#54fcfc><caster.l.x{round=0}> <#54fc54>Y<&co> <#54fcfc><caster.l.y{round=0}> <#54fc54>Z<&co> <#54fcfc><caster.l.z{round=0}> <#54fc54>Pitch<&co> <#54fcfc><caster.l.pitch{round=0}> <#54fc54>Yaw<&co> <#54fcfc><caster.l.yaw{round=0}>} @self

