#- - - - - Start Scale - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - 
#/scale <amount> [players]- set's the scale
# scale:
#   Command:
#     Id: scale
#     Completions:
#       amount:
#         - 1
#         - 2.5
#         - 5
#         - 10
#       player:
#         - players
#   Conditions:
#   - haspermission{p=skycommands.setscale} orElseCast skypermissiondenied
#   Skills:
#   - skill{s=scale2} @playerbyname{name=<skill.var.player|<caster.name>>;targetself=true;targetcreative=true}

# scale2:
#   Skills:
#   - sudoskill{s=[
#     - aura{name=scalecommand;duration=999999999;cancelondeath=false;cancelonquit=false;bartimer=true;
#       components=[
#         - stat{stat=SCALE;type=SETTER;value=<skill.var.amount|1>}
#       ]} @self
#     ]} @playerbyname{name=<skill.var.player|<caster.name>>;targetself=true;targetcreative=true}
setscale:
  Command:
    Id: scale
    Aliases: 
    - setscale
    - ssetscale
    - size
    - ssize
    - sscale
    Completions:
      amount:
      - 0.5
      - 1
      - 5
      - 10
      player:
      - players
  Conditions:
  - haspermission{p=skycommands.setscale} orElseCast skypermissiondenied
  - stringequals{val1=<skill.var.amount>;val2=UNDEFINED} false
  - stringequals{val1=<skill.var.amount>;val2=1} castinstead setscaleremove
  Skills:
  - skill{s=setscale2} @playerbyname{name=<skill.var.player|<caster.name>>;targetself=true;targetcreative=true}

setscale2:
  Conditions:
  - (stringequals{val1=<skill.var.player>;val2=UNDEFINED} true || haspermission{p=skycommands.setscaleother} ) orElseCast skypermissiondenied
  Skills:
  - sudoskill{s=[
    - removeaura{aura=scalecommand} @self
    - aura{duration=99999999;i=20;auraname=scalecommand;cancelondeath=false;cancelonquit=false;
      components=[
        - stat{stat=SCALE;type=SETTER;value=<skill.var.amount|1>}
        ]} @self
    ]} @playerbyname{name=<skill.var.player|<caster.name>>;targetself=true;targetcreative=true}
  - message{m="<#54fc54>Scale set to <#54fcfc><skill.var.amount|1></#54fcfc> for <#54fcfc><skill.var.player|<caster.name>>"} @self ?!stringequals{val1=<skill.var.player>;val2=UNDEFINED}
  - message{m="<#54fc54>Your scale has been set to <#54fcfc><skill.var.amount|1>"} @playerbyname{name=<skill.var.player|<caster.name>>;targetself=true;targetcreative=true}

setscaleremove:
  Command:
    Id: resetscale
    Completions:
      player:
      - players
  Skills:
  - sudoskill{skill=[ removeaura{aura=scalecommand} @self ]} @playerbyname{name=<skill.var.player|<caster.name>>;targetself=true;targetcreative=true} 


