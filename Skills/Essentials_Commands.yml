#/repair [hand|all]
repair:
  Command:
    Id: repair
  Conditions:
  - haspermission{p=skycommands.repair} true "<#d45353>You do not have permission to execute that command"
  Skills:
  - setvar{var=skill.repairitem;val=<target.item.itemstack.HAND>;type=ITEM} @self
  - setvar{var=skill.repairitem;val=<skill.var.repairitem.withDurability{durability=0}>;type=ITEM} @self
  # - consumeHeldItem{a=64} @self
  - equip{i=itemvariable{variable=skill.repairitem} HAND} @self
  - message{m=<#3bfa22><skill.var.repairitem.type.toString.lowercase.capitalize.replace{from="_";to=" "}> <#df1ab4>repaired} @self

#/speed [WALK|FLY] <speed> [player]
setspeed:
  Command:
    Id: speed
    Aliases: 
    - setspeed
    - flyspeed
    - walkspeed
    Completions:
      walkorfly:
      - walk
      - fly
      speed:
      - 2
      - 5
      - 10
      player:
      - players
  Conditions:
  - haspermission{p=skycommands.setspeed} true "<#d45353>You do not have permission to execute that command"
  - stringequals{val1=<skill.var.walkorfly>;val2=UNDEFINED} false
  - stringequals{val1=<skill.var.speed>;val2=UNDEFINED} false
  - stringequals{val1=<skill.var.player>;val2=UNDEFINED} orElseCast setspeedother
  Skills:
  - vskill{skill=[ - setspeed{type=<skill.var.walkorfly>;amount=<skill.var.speed>} @self ]}
  - message{m="<#df1ab4><skill.var.walkorfly.capitalize> speed set to <#3bfa22><skill.var.speed>"} @self
setspeedother:
  Conditions:
  - haspermission{p=skycommands.setspeedother} true "<#d45353>You do not have permission to execute that command"
  Skills:
  - vskill{skill=[ - setspeed{type=<skill.var.walkorfly>;amount=<skill.var.speed>} @playerbyname{name=<skill.var.player>;targetself=true} ]}
  - message{m="<#df1ab4><skill.var.walkorfly.capitalize> speed set to <#3bfa22><skill.var.speed></#3bfa22> for <#3bfa22><skill.var.player>"} @self
  - message{m="<#df1ab4><skill.var.walkorfly.capitalize> speed set to <#3bfa22><skill.var.speed>"} @playerbyname{name=<skill.var.player>;targetself=true}


