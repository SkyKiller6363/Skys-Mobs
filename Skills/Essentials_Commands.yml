#all of this is still very much so experimental. I'm mostly just learning how the command system works within mythic and how best to build everything. 


# Permission Skill
skypermissiondenied:
  Skills:
  - message{m=<#d45353>You do not have permission to execute that command} @self

#- - - - - Start Fly - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - 
# /fly <player> <Enable|Disable>
# Allows the target to fly

playerfly: 
  Command:
    Id: fly
    aliases:
    - sfly
    Completions:
      player:
      - players
      onoroff:
      - Enable
      - Disable
  Conditions:
  - haspermission{p=skycommands.fly} orElseCast skypermissiondenied 
  Skills:
  - skill{s=playerfly2} @playerbyname{name=<skill.var.player{default=<caster.name>}>;targetself=true}
playerfly2:
  Conditions:
  - (stringequals{val1=<skill.var.player>;val2=UNDEFINED} true || haspermission{p=skycommands.flyother} ) orElseCast skypermissiondenied
  - stringequals{val1=Disable;val2=<skill.var.onoroff>} castinstead playerfly-remove
  TargetConditions:
  - hasaura{aura=flycommand} castinstead playerfly-remove
  Skills:
  - sudoskill{s=[
    - aura{duration=99999999;i=20;auraname=flycommand;cancelondeath=false;cancelonquit=false;
      components=[
        - fly
        ]} @self 
    ]} @playerbyname{name=<skill.var.player{default=<caster.name>}>;targetself=true}
  - message{m=<#54fc54>Fly <#2a7c3c>Enabled</#2a7c3c> for <#2a7c3c><skill.var.player{default=<caster.name>}>} @self ?!stringequals{val1=<skill.var.player>;val2=UNDEFINED}
  - message{m=<#54fc54>Fly <#2a7c3c>Enabled} @playerbyname{name=<skill.var.player{default=<caster.name>}>;targetself=true;targetcreative=true}

playerfly-remove:
  Skills:
  - removeaura{aura=flycommand} @playerbyname{name=<skill.var.player{default=<caster.name>}>;targetself=true;targetcreative=true}
  - message{m=<#54fc54>Fly <#fa2222>Disabled</#fa2222> for <#2a7c3c><skill.var.player{default=<caster.name>}>} @self ?!stringequals{val1=<skill.var.player>;val2=UNDEFINED}
  - message{m=<#54fc54>Fly <#fa2222>Disabled} @playerbyname{name=<skill.var.player{default=<caster.name>}>;targetself=true;targetcreative=true}

#- - - - - End Fly - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - 


