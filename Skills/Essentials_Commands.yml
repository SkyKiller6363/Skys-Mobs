  # - consumeHeldItem{a=64} @self
  - equip{i=itemvariable{variable=skill.repairitem} HAND} @self
  - message{m=<#2a7c3c><skill.var.repairitem.type.toString.lowercase.capitalize.replace{from="_";to=" "}> <#54fc54>repaired} @self

