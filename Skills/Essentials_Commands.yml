  Conditions:
  - haspermission{p=skycommands.godmode}
  Skills:
  - removeaura{aura=godmode} @playerbyname{name=<skill.var.player{default=<caster.name>}>;targetself=true;targetcreative=true}
  - message{m=<#54fc54>God Mode <#fa2222>Disabled</#fa2222> for <#2a7c3c><skill.var.player{default=<caster.name>}>} @self ?!stringequals{val1=<skill.var.player>;val2=UNDEFINED}
